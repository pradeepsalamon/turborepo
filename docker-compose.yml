services:
  postgres:
    image: postgres:15-alpine
    container_name: book_my_show_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: bookmyshow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
